<!DOCTYPE html>
<html lang="en">
<head>
    <title>Apple Interface</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="fruit-lips.css">
    <script src="./fruit-lips.js"></script>
</head>

<body>

    <header class="site-header">
        <h1>Apple Interface</h1>
        <span class="edition"><a href="https://www.instagram.com/a6byart/" target="_blank">@a6byart</a></span>
    </header>

    <div class="container">

        <div class="images" id="images"></div>

        <div class="output" id="output"></div>

        <div class="text-form">
            <label for="textInput">Enter text to speak</label>
            <div class="input-row">
                <input type="text" id="textInput" placeholder="say something&hellip;" autocomplete="off">
                <button type="submit" form="textForm"><span>Submit</span></button>
            </div>
            <form id="textForm" style="display:none"></form>
        </div>

    </div>

    <div class="board hidden">
        <h2>Memory</h2>
        <div class="board-list"></div>
    </div>

</body>
</html>
