<!DOCTYPE html>
<html>
<head>
    <title>Voice to Text</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="fruit-lips.css">
    <script src="./fruit-lips.js"></script>
</head>

<body>

    <div class="container">

        <h1>Apple Interface</h1>

        <div class="images" id="images"></div>

        <div class="text-form">
            <form id="textForm">
                <input type="text" id="textInput" placeholder="Enter text here" required>
                <button type="submit">Submit</button>
            </form>
        </div>
        <div class="output" id="output"></div>
    </div>

    <div class="board hidden">
        <h2>Most recent requests:</h2>
        <div class="board-list"></div>
    </div>

</body>
</html>
